apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: multitier-demo
  annotations:
    # Tells GKE to create a Network Endpoint Group so the Ingress's HTTP(S)
    # load balancer can route directly to pod IPs (container-native LB).
    cloud.google.com/neg: '{"ingress": true}'
spec:
  # ClusterIP, not LoadBalancer — the Ingress below is now the external
  # entry point. (Local Minikube/Kind: use NodePort instead, Ingress needs
  # an Ingress controller add-on there.)
  type: ClusterIP
  selector:
    app: product-service
  ports:
    - port: 80
      targetPort: 8080
