apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: product-service-ingress
  namespace: multitier-demo
spec:
  # No ingressClassName needed on GKE — "gce" is the default IngressClass
  # unless you've installed your own controller (e.g. nginx).
  rules:
    - http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: product-service
                port:
                  number: 80
