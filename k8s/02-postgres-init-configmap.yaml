apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: multitier-demo
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS products (
        id BIGSERIAL PRIMARY KEY,
        name VARCHAR(255) NOT NULL,
        description VARCHAR(500),
        price NUMERIC(10,2) NOT NULL,
        stock INTEGER NOT NULL DEFAULT 0
    );

    INSERT INTO products (name, description, price, stock) VALUES
    ('Wireless Mouse', 'Ergonomic wireless mouse with USB receiver', 19.99, 150),
    ('Mechanical Keyboard', 'RGB backlit mechanical keyboard', 59.99, 80),
    ('27-inch Monitor', '4K UHD IPS monitor', 249.99, 35),
    ('USB-C Hub', '7-in-1 USB-C hub with HDMI and SD card reader', 29.99, 200),
    ('Monitor', 'Monitor', 30, 200),
    ('Webcam 1080p', 'Full HD webcam with autofocus', 39.99, 60);
