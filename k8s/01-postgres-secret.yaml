# For a real deployment, don't check real credentials into git.
# Prefer: kubectl create secret generic postgres-secret --from-literal=... 
# or a secrets manager / sealed-secrets / external-secrets operator.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: multitier-demo
type: Opaque
stringData:
  POSTGRES_DB: productdb
  POSTGRES_USER: produser
  POSTGRES_PASSWORD: prodpass123
